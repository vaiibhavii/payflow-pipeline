<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayFlow | Engineering Console</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161b2a;
            --mint: #00ffa3;
            --slate: #94a3b8;
            --text: #ffffff;
            --border: #2d3343;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
        }
        /* Navigation */
        nav {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.5rem; margin-bottom: 2rem; }
        .logo span { color: var(--mint); }
        .nav-item { color: var(--slate); text-decoration: none; padding: 0.75rem 0; font-size: 0.9rem; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { color: var(--mint); }

        /* Main Content */
        main { flex: 1; padding: 2rem; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        /* Responsive Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        
        .card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 1.5rem; 
            border-radius: 4px;
        }
        .kpi-val { font-family: 'JetBrains Mono', monospace; font-size: 2rem; color: var(--mint); margin: 0.5rem 0; }
        .kpi-label { color: var(--slate); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        canvas { width: 100% !important; height: 350px !important; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">PAYFLOW<span>_</span></div>
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Medallion Explorer</a>
        <a href="#" class="nav-item">Pipeline Logs</a>
        <div style="margin-top: auto; font-size: 0.7rem; color: var(--slate);">
            SYSTEM STATUS: <span style="color: var(--mint)">ONLINE</span>
        </div>
    </nav>
    <main>
        <div class="header">
            <h2>Pipeline Performance</h2>
            <div id="last-updated" style="font-size: 0.8rem; color: var(--slate);"></div>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="kpi-label">Ingested Records</div>
                <div class="kpi-val" id="total-rows">1.2M+</div>
            </div>
            <div class="card">
                <div class="kpi-label">Latency</div>
                <div class="kpi-val">142ms</div>
            </div>
            <div class="card">
                <div class="kpi-label">Storage Efficiency</div>
                <div class="kpi-val">12.4x</div>
            </div>
        </div>

        <div class="card" style="margin-top: 1.5rem;">
            <div class="kpi-label" style="margin-bottom: 1rem;">Transaction Volume Trend</div>
            <canvas id="trendChart"></canvas>
        </div>
    </main>

    <script>
        document.getElementById('last-updated').innerText = `Sync: ${new Date().toLocaleTimeString()}`;

        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                const ctx = document.getElementById('trendChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.month),
                        datasets: [{
                            label: 'Volume (Millions)',
                            data: data.map(d => d.volume),
                            borderColor: '#00ffa3',
                            borderWidth: 2,
                            pointBackgroundColor: '#00ffa3',
                            backgroundColor: 'rgba(0, 255, 163, 0.05)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: '#2d3343' }, ticks: { color: '#94a3b8' } },
                            x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                        }
                    }
                });
            } catch (e) {
                console.error("Dashboard data load failed:", e);
            }
        }
        init();
    </script>
</body>
</html>
