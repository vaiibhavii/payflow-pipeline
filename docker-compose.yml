version: "3.8"

services:

  # ── REDPANDA (Kafka-compatible, open source, single container) ──
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    container_name: payflow-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"   # Kafka API (external)
      - "18082:18082"   # Pandaproxy REST
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - payflow-net

  # ── REDPANDA CONSOLE (UI for topic/message inspection) ──
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: payflow-console
    depends_on: [redpanda]
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    networks:
      - payflow-net

  # ── KESTRA (open source orchestration) ──
  kestra:
    image: kestra/kestra:latest
    container_name: payflow-kestra
    pull_policy: always
    entrypoint: /bin/bash
    command: server standalone --worker-thread=128
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - D:/payflow-pipeline:/payflow   # Mount your project
    ports:
      - "8090:8080"    # Kestra UI → http://localhost:8090
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payflow-net

  # ── POSTGRES (required by Kestra) ──
  postgres:
    image: postgres:15
    container_name: payflow-postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U kestra"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payflow-net

  # ── MINIO (already running separately, listed for reference) ──
  # minio:
  #   image: quay.io/minio/minio
  #   Already started with: docker run -d -p 9000:9000 -p 9001:9001 ...

volumes:
  redpanda-data:
  kestra-data:
  postgres-data:

networks:
  payflow-net:
    driver: bridge
